# Use zsh as default
set -g default-shell /bin/zsh

# Enable 256-color and true-color (24-bit) support in tmux
set -g default-terminal "tmux-256color" # Use tmux-specific terminal capabilities
set -as terminal-features ",*:RGB" # Enable true-color support for compatible terminals

# General
set -g set-clipboard on # Use system clipboard
set -g detach-on-destroy off # Don't exit from tmux when closing a session
set -g escape-time 0 # Remove delay for exiting insert mode with ESC in Neovim
set -g history-limit 1000000 # Increase history size (from 2,000)
set -g mouse on # Enable mouse support
set -g allow-passthrough on # Allow programs in the pane to bypass tmux (e.g. for image preview)

# Set prefix key
unbind C-b # Unbind the default prefix key
set -g prefix C-Space # Set new prefix key to Ctrl+Space

# Config
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded"

# Pane
unbind %
bind \\ split-window -h -c "#{pane_current_path}"
unbind \"
bind - split-window -v -c "#{pane_current_path}"
bind -r h resize-pane -L 5
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r m resize-pane -Z
bind-key _ display-popup -E "tmux-gem-pane -v"
bind-key | display-popup -E "tmux-gem-pane -h"

# Window
bind c new-window -c "#{pane_current_path}"
bind-key w display-popup -E "tmux-window-switcher"

# Session
bind-key s new-window "tmux-session-switcher"
bind-key S new-window "ghq-sessionizer"
bind-key x display-popup -E "tmux-session-killer"

# Project
bind-key g display-popup -E "bopen"

# Use vi keys in copy mode
set -gw mode-keys vi

# Start selecting text with "v"
bind-key -T copy-mode-vi 'v' send-keys -X begin-selection \; send-keys -X rectangle-off

# Start selecting text like in block mode with Ctrl + v
bind-key -T copy-mode-vi C-v send-keys -X begin-selection \; send-keys -X rectangle-on

# Don't exit copy mode when dragging with mouse
unbind -T copy-mode-vi MouseDragEnd1Pane

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on # Automatically renumber windows when one is closed

# tpm plugin manager
set -g @plugin 'tmux-plugins/tpm'

# List of plugins
set -g @plugin 'christoomey/vim-tmux-navigator' # Enable navigating between nvim and tmux
set -g @plugin 'tmux-plugins/tmux-resurrect' # Persist tmux sessions after computer restart
set -g @plugin 'tmux-plugins/tmux-continuum' # Automatically saves sessions every 15 minutes

# Style
gray_light="#D8DEE9"
gray_dark="#3B4252"
green_soft="#A3BE8C"
blue_muted="#81A1C1"
cyan_soft="#88C0D0"

# Minimal status line: session name, current window, no inactive windows or right status
set -g status-position top
set -g status-left-length 30
set -g status-style "fg=${gray_light},bg=default"
set -g status-left "#[fg=${green_soft},bold] #S #[fg=${gray_light},nobold] | "
set -g window-status-current-format "#[fg=${cyan_soft},bold] #[underscore]#I:#W"
set -g window-status-format ""
set -g window-status-separator ""
set -g message-style "fg=${gray_light},bg=default"
set -g mode-style "fg=${gray_dark},bg=${blue_muted}"
set -g pane-border-style "fg=${gray_dark}"
set -g pane-active-border-style "fg=${green_soft}"

set -g status-right ""

# Resurrect
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# Keep copy-mode after yanking. This is intentionally after TPM so plugin defaults cannot override it.
bind -T copy-mode-vi 'y' send-keys -X copy-pipe "wl-copy"
